syntax = "proto3";
package bluechipchain.fixedmint;

import "amino/amino.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";

option go_package = "bluechipChain/x/fixedmint/types";

// Params defines the parameters for the module.
message Params {
  option (amino.name) = "bluechipchain/x/fixedmint/Params";
  option (gogoproto.equal) = true;

  // mint_denom is the denomination of the coin to mint.
  string mint_denom = 1;
  // mint_amount is the amount of coins (in base denom) to mint per block.
  string mint_amount = 2 [(cosmos_proto.scalar) = "cosmos.Int", (gogoproto.customtype) = "cosmossdk.io/math.Int", (gogoproto.nullable) = false];
  // mint_enabled indicates whether fixed minting is active.
  bool mint_enabled = 3;
}