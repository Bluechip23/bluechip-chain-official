syntax = "proto3";
package bluechipchain.liquidityvault;

import "amino/amino.proto";
import "cosmos/msg/v1/msg.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";
import "cosmos/base/v1beta1/coin.proto";
import "bluechipchain/liquidityvault/params.proto";
import "bluechipchain/liquidityvault/types.proto";

option go_package = "bluechipChain/x/liquidityvault/types";

// Msg defines the Msg service.
service Msg {
  option (cosmos.msg.v1.service) = true;

  rpc UpdateParams(MsgUpdateParams) returns (MsgUpdateParamsResponse);
  rpc RegisterValidator(MsgRegisterValidator) returns (MsgRegisterValidatorResponse);
  rpc DepositToVault(MsgDepositToVault) returns (MsgDepositToVaultResponse);
  rpc SetDelegatorRewardPercent(MsgSetDelegatorRewardPercent) returns (MsgSetDelegatorRewardPercentResponse);
}

message MsgUpdateParams {
  option (cosmos.msg.v1.signer) = "authority";
  option (amino.name) = "bluechipchain/x/liquidityvault/MsgUpdateParams";
  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  Params params = 2 [(gogoproto.nullable) = false, (amino.dont_omitempty) = true];
}
message MsgUpdateParamsResponse {}

message MsgRegisterValidator {
  option (cosmos.msg.v1.signer) = "validator_address";
  string validator_address = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  ValidatorType validator_type = 2;
}
message MsgRegisterValidatorResponse {}

message MsgDepositToVault {
  option (cosmos.msg.v1.signer) = "validator_address";
  string validator_address = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  // pool_contract_address is the address of the pool to deposit into
  string pool_contract_address = 2 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  // amount0 is the ubluechip amount
  cosmos.base.v1beta1.Coin amount0 = 3 [(gogoproto.nullable) = false];
  // cw20_contract_address is the CW20 creator token contract address
  string cw20_contract_address = 4 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  // amount1 is the CW20 creator token amount
  string amount1 = 5 [
    (cosmos_proto.scalar) = "cosmos.Int",
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
  ];
}
message MsgDepositToVaultResponse {
  string position_id = 1;
}

message MsgSetDelegatorRewardPercent {
  option (cosmos.msg.v1.signer) = "validator_address";
  string validator_address = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string percent = 2 [
    (cosmos_proto.scalar) = "cosmos.Dec",
    (gogoproto.customtype) = "cosmossdk.io/math.LegacyDec",
    (gogoproto.nullable) = false
  ];
}
message MsgSetDelegatorRewardPercentResponse {}
