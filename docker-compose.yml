services:
  bluechipd:
    build: .
    container_name: bluechip-node
    restart: unless-stopped
    ports:
      - "26656:26656"   # P2P
      - "26657:26657"   # RPC  (reverse proxy -> https://bluechip.rpc.bluechip.link)
      - "1317:1317"     # REST (reverse proxy -> https://bluechip.api.bluechip.link)
      - "9090:9090"     # gRPC
    volumes:
      - bluechip-data:/root/.bluechipChain
    environment:
      - MONIKER=bluechip-node
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        # Initialize only if not already initialized
        if [ ! -f /root/.bluechipChain/config/genesis.json ]; then
          bluechipd init "$$MONIKER" --chain-id bluechip-3 --home /root/.bluechipChain

          # Download the correct genesis
          curl -sL https://raw.githubusercontent.com/Bluechip23/bluechip-chain-official/main/genesis.json \
            -o /root/.bluechipChain/config/genesis.json

          # Enable REST API (off by default)
          sed -i '/^\[api\]/,/^\[/{s/^enable = false/enable = true/}' /root/.bluechipChain/config/app.toml

          # Bind REST to all interfaces so Docker port mapping works
          sed -i 's|^address = "tcp://localhost:1317"|address = "tcp://0.0.0.0:1317"|' /root/.bluechipChain/config/app.toml

          # Bind RPC to all interfaces
          sed -i 's|^laddr = "tcp://127.0.0.1:26657"|laddr = "tcp://0.0.0.0:26657"|' /root/.bluechipChain/config/config.toml

          # Set minimum gas price
          sed -i 's/^minimum-gas-prices *=.*/minimum-gas-prices = "0.025ubluechip"/' /root/.bluechipChain/config/app.toml
        fi

        exec bluechipd start --home /root/.bluechipChain

volumes:
  bluechip-data:
